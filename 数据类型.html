<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>01.数据类型</title>
</head>
<body>
  <script>
    /*
      1.分类
        *基本数据类型
          number 数值型 任意数值
          string 字符串型 任意字符串
          boolean 布尔型 true或false
          null 空型 null
          undefined 未定义型 undefined
          symbol 符号型 symbol对象
        *引用数据类型
          object 对象型   任意对象
          function 函数型 一种特殊对象 可以调用
          array 数组型 一种特殊对象   数值下标 内部数据是有序的  可以遍历
        *其他数据类型
          bigint 大整数型 任意大整数
      2.判断
        typeof 操作符 可以判断变量的数据类型
          语法：typeof 变量名
          返回值：字符串 表示变量的数据类型  注意：返回值是小写
          注意：typeof 操作符只能判断基本数据类型  不能判断引用数据类型
        === 操作符 可以判断变量的数据类型  不能判断引用数据类型
          语法：变量名 === 类型名
          返回值：布尔值 表示变量的数据类型是否是类型名
          注意：=== 操作符只能判断基本数据类型  不能判断引用数据类型  可以判断null和undefined
        instanceof 操作符 可以判断变量的数据类型  不能判断基本数据类型
          语法：变量名 instanceof 类型名
          返回值：布尔值 表示变量的数据类型是否是类型名
          注意：instanceof 操作符只能判断引用数据类型  不能判断基本数据类型
    */

    /*
      3.特殊数据类型
        *null 空型 null  空值  定义为空值
        *undefined 未定义型 undefined  表示变量定义了没有赋值
        *bigint 大整数型 任意大整数
        *symbol 符号型 symbol对象
    */

    let a;
    console.log(a); // undefined
    console.log(typeof a); // undefined
    a = null;
    console.log(a); // null
    console.log(typeof a); // object

    let b = null;
    b = 23;
    console.log(b); // 23
    console.log(typeof b); // number

    console.log(typeof fsf === 'undefined'); // true
    console.log(typeof NaN === 'number'); // true

    function getType(value) {
      return Object.prototype.toString.call(value).slice(8, -1).toLowerCase();
    }
    console.log(getType(123)); // number
    console.log(getType("123")); // string
    console.log(getType(true)); // boolean
    console.log(getType(null)); // null
    console.log(getType(undefined)); // undefined
    console.log(getType({})); // object
    console.log(getType(function() {})); // function
    console.log(getType([])); // array
    console.log(getType(123n)); // bigint
    console.log(getType(Symbol("symbol"))); // symbol
  </script>
</body>
</html>
