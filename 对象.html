<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>对象</title>
</head>
<body>
  <script>
    // 对象
    // 1. 定义对象
    var obj = {};
    console.log(obj);
    console.log(typeof obj); // object
    console.log(obj instanceof Object); // true
    // 对象的创建方式
  </script>
</body>
</html>
