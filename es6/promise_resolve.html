<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Promise_resolve 方法</title>
</head>

<body>
  <script>

    console.log('start---------------');
    new Promise((resolve, reject) => {
      // executor 函数 会立即执行 划分Promise的状态为成功或失败
      // pending 状态  waiting 状态  等待状态  等待resolve或reject函数的调用
      // 状态一旦确定 就不能改变
      console.log('executor 函数');
      console.log('立即执行的回调函数, 先执行的这里');
      resolve('成功'); // fulfilled 状态
      reject('失败'); // rejected 状态
    }).then(success => console.log(success), err => console.log(err));
    console.log('end---------------');


    // resolve 参数
    /*
      1. 普通的值或对象 pedding 状态 => fulfilled 状态
      2. Promise实例 直接返回该Promise实例 不会改变状态 状态移交 状态由该Promise实例的状态决定
      3. thenable对象指的是具有then方法的对象
         会执行then方法 并由then方法返回的结果决定状态
    */

    // 普通的值或对象
    const promise = Promise.resolve('成功的Promise');
    const promise2 = Promise.resolve();
    console.log(promise);
    console.log(promise2);
    promise.then(success => console.log(success));
    promise2.then(success => console.log(success));

    // Promise实例
    const newPromise = new Promise((resolve, reject) => {
      // promise实例的状态 success 状态 => fulfilled 状态
      // resolve('成功的Promise11');
      reject('失败的Promise11');
    });
    new Promise((resolve, reject) => {
      // 新的Promise实例 状态由 newPromise 状态决定
      // 如果 newPromise 状态为 fulfilled 则新的Promise实例状态为 fulfilled
      // 如果 newPromise 状态为 rejected 则新的Promise实例状态为 rejected
      resolve(newPromise);
    }).then(success => console.log(success), err => console.log(err));


    new Promise((resolve, reject) => {
      // thenable对象
      const thenable = {
        // then 方法的两个参数是 Promise 内部传入的 resolve/reject 函数
        // 调用它们来改变 Promise 的状态，不需要 return
        then: (resolve, reject) => {
          resolve('thenable对象 成功的thenable');
          // reject('失败的thenable');
        }
        // then:() => {
        //   // 只是执行then方法
        //   console.log('then 方法');
        // }
      };
      resolve(thenable);
    }).then(success => console.log(success), err => console.log(err));
  </script>
</body>

</html>
