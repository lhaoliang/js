<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>set map 数据结构</title>
</head>

<body>
  <script>
    // set 数据结构
    // 用于存储唯一的值
    // 说明：set 数据结构的值是唯一的，不能重复
    let set = new Set();
    const o = { a: 1, b: 2 };
    set.add(o);
    set.add(1);
    set.add(2);
    console.log(set); // Set {1, 2}
    console.log(set.size); // 2
    // set.delete(2); 返回 true
    console.log(set); // Set {1}
    console.log(set.has(1)); // true
    console.log(set.has(2)); // false

    // set.clear();
    // console.log(set); // Set {}
    // console.log(set.size); // 0

    const arr = [22, 12, 30, 33, 22, 90, 12, 30];
    const arrSet = new Set(arr);
    arrSet.forEach(item => console.log(item)); // set 可以遍历
    console.log(arrSet); // Set {22, 12, 30, 33, 90, 12}
    // const newArr = [...arrSet];
    // console.log(newArr); // [22, 12, 30, 33, 90, 12]
    const newArr = Array.from(arrSet);
    console.log(newArr); // [22, 12, 30, 33, 90, 12]
    console.log(newArr.sort()); // [12, 22, 22, 30, 33, 90]


    // weakset
    // 只能存放对象类型的数据
    // 用于存储弱引用的值
    // 不可以遍历 weakset 数据结构
    // 说明：weakset 数据结构的值是弱引用的，不会阻止垃圾回收器回收  set 数据结构的值是强引用的，会阻止垃圾回收器回收
    const weakSet = new WeakSet();
    // weakSet.add(10) // 报错，只能存放对象类型的数据



    // map 数据结构
    // 用于存储键值对
    // 说明：map 数据结构的键可以是任意值，值也可以是任意值
    // 例如：let map = new Map();
    // 例如：map.set('name', 'zhangsan');
    // 例如：console.log(map); // Map {name => zhangsan}
    // 例如：console.log(map.get('name')); // zhangsan
    // 例如：map.delete('name');
    // 例如：console.log(map); // Map {}
    // 例如：console.log(map.size); // 0
    let map = new Map();
    map.set('name', 'zhangsan');
    console.log(map); // Map {name => zhangsan}
    console.log(map.get('name')); // zhangsan
    map.delete('name');
    console.log(map); // Map {}
    console.log(map.size); // 0
  </script>
</body>

</html>
