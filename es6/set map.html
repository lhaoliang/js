<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>set map 数据结构</title>
</head>
<body>
  <script>
    // set 数据结构
    // 用于存储唯一的值
    // 说明：set 数据结构的值是唯一的，不能重复
    // 例如：let set = new Set();
    // 例如：set.add(1);
    // 例如：set.add(2);
    // 例如：set.add(3);
    // 例如：console.log(set); // Set {1, 2, 3}
    // 例如：console.log(set.size); // 3
    // 例如：set.delete(2);
    // 例如：console.log(set); // Set {1, 3}
    // 例如：console.log(set.has(1)); // true
    // 例如：console.log(set.has(2)); // false
    // 例如：set.clear();
    // 例如：console.log(set); // Set {}
    // 例如：console.log(set.size); // 0
    let set = new Set();
    set.add(1);
    set.add(2);
    set.add(3);
    console.log(set); // Set {1, 2, 3}
    console.log(set.size); // 3
    set.delete(2);
    console.log(set); // Set {1, 3}
    console.log(set.has(1)); // true
    console.log(set.has(2)); // false
    set.clear();
    console.log(set); // Set {}
    console.log(set.size); // 0
    // map 数据结构
    // 用于存储键值对
    // 说明：map 数据结构的键可以是任意值，值也可以是任意值
    // 例如：let map = new Map();
    // 例如：map.set('name', 'zhangsan');
    // 例如：console.log(map); // Map {name => zhangsan}
    // 例如：console.log(map.get('name')); // zhangsan
    // 例如：map.delete('name');
    // 例如：console.log(map); // Map {}
    // 例如：console.log(map.size); // 0
    let map = new Map();
    map.set('name', 'zhangsan');
    console.log(map); // Map {name => zhangsan}
    console.log(map.get('name')); // zhangsan
    map.delete('name');
    console.log(map); // Map {}
    console.log(map.size); // 0
  </script>
</body>
</html>
