<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Symbol</title>
</head>
<body>
  <script>
    const sym = Symbol("sym");
    console.log(sym); // Symbol(sym)
    console.log(typeof sym); // symbol
  </script>
</body>
</html>
