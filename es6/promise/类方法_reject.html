<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>类方法_reject</title>
</head>
<body>
  <script>
    // 类方法 Promise.reject 可以将普通的值、promise对象、thenable对象转换为promise对象
    Promise.reject("失败reject").catch(err => console.log("err", err));
    // 无论传入什么值，都是一样的 都会被catch捕获
    const promise = Promise.reject({ name: 'apple' });
    promise.catch(err => console.log("err", err));
    console.log(promise);
  </script>
</body>
</html>
