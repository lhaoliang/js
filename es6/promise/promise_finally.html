<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>promise_finally</title>
</head>
<body>
  <script>
    const promise = new Promise((resolve, reject) => {
      resolve('success');
    });
    promise.then(res => {console.log(res)}, err => console.log(err)).finally(() => console.log('finally'));
  </script>
</body>
</html>
