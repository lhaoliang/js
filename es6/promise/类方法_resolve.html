<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>类方法_resolve</title>
</head>
<body>
  <script>
    function foo() {
      const obj = { name: 'apple' };
      return new Promise((resolve, reject) => {
        resolve(obj);
      });
    }
    foo().then(res => console.log("res", res));

    // 类方法 Promise.resolve 可以将普通的值、promise对象、thenable对象转换为promise对象
    Promise.resolve("成功resolve").then(res => console.log("res", res));

    // 1.普通的值
    const promise = Promise.resolve({ name: 'apple' });
    console.log(promise);
    // 2. promise对象
    const promise2 = Promise.resolve(promise);
    promise2.then(res => console.log("res", res));
    // 3.thenable对象
    const promise3 = Promise.resolve({ then: () => console.log("then") });
    promise3.then(res => console.log("res", res));
  </script>
</body>
</html>
