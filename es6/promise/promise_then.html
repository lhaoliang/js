<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Promise then 方法</title>
</head>

<body>
  <script>
    console.log(Promise.prototype)
    // Promise then 方法  对象方法
    const promise = new Promise((resolve, reject) => {
      resolve('resolve 方法被调用时，会触发所有then方法');
    });
    promise.then(success => console.log(success));

    // 1.同一个promise可以调用多次then方法
    // 当我们resolve方法调用时，会触发所有then方法
    promise.then(success => console.log(success));
    promise.then(success2 => console.log(success2));

    // 2.then 方法 传入的回调函数 可以有返回值 返回的是一个新的promise
      // 2.1 如果我们返回的是一个普通值，那么新的promise就会以成功状态返回
      //     并且返回值就是新的promise的resolve方法的参数 没有返回值时，默认返回undefined
      const returnPromise = promise.then(success => {
        return 'then 方法返回的普通值 新的promise就会以成功状态返回';
        // 相当于以下代码  可以继续调用then方法
        // return new Promise((resolve, reject) => {
        //   resolve('then 方法返回的promise 新的promise就会以成功状态返回');
        // });
      });
      returnPromise.then(success => console.log(success));
      console.log(returnPromise);
      // 2.2 如果我们返回的是一个promise，那么新的promise就会以该promise的状态返回
      // promise.then(res => {
      //   return new Promise((resolve, reject) => {
      //     setTimeout(() => {
      //       resolve(111);
      //     }, 3000);
      //   }).then(res => console.log(res));
      // })
      // 2.3 如果我们返回的是一个对象 并且该对象有then方法，那么新的promise就会以该对象的状态返回
      promise.then(res => {
        return {
          then: (resolve, reject) => {
            resolve(222);
          }
        }
      }).then(res => console.log(res));

  </script>
</body>

</html>
