<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>promise_catch 对象方法</title>
</head>

<body>
  <script>
    // 1. 我们可以使用catch方法来捕获promise的拒绝状态
    const promise = new Promise((resolve, reject) => {
      resolve('success');
      // reject('error');
      // 也可以使用throw语句来抛出错误 都会将promise的状态设置为拒绝状态
      // throw new Error('error11');
    });
    console.log(promise);
    // promise.catch(err => console.log(err));
    // 2. 我们也可以使用then方法来捕获promise的拒绝状态
    promise.then(res => console.log(res), err => console.log(err));

    // 通过catch方法来捕获promise的拒绝状态 可以在catch方法中处理错误
    promise.catch(err => console.log(err));
    promise.catch(err => console.log(err));

    promise.then(res => console.log(res)).catch(err => console.log(err));

    promise.then(res => {
      // return new Promise((resolve, reject) => {
      //   reject('then里面的reject');
      // });
      throw new Error('then里面的throw');
    }).catch(err => console.log("err: ", err));

    // 拒绝捕获的问题
    const promise2 = new Promise((resolve, reject) => {
      reject('error22');
    });
    promise2.then(res => console.log(res)).catch(err => console.log(err));
    promise2.catch(err => console.log(err));

    // catch方法的返回值 跟then方法的返回值是一致的
  </script>
</body>

</html>
