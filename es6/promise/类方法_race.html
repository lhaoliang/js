<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>类方法_race</title>
</head>
<body>
  <script>
    // race 竞赛
    // 类方法 Promise.race
    // 只要有一个promise对象成功，就会返回成功的结果
    // 只要有一个promise对象失败，就会返回失败的结果
    const p1 = new Promise((resolve, reject) => {
      // reject("reject失败1");
      resolve("resolve成功1");
    });
    const p2 = new Promise((resolve, reject) => {
      setTimeout(() => {
        reject("reject失败2");
      }, 2000);
    });
    const p3 = new Promise((resolve, reject) => {
      reject("reject失败3");
      // resolve("resolve成功3");
    });
    Promise.race([p1, p2, p3, { name: 'apple' }]).then(res => console.log("res", res)).catch(err => console.log("err", err));

    // 类方法 Promise.any 任意一个成功对象，就会返回成功的结果
    // 所有的promise对象都失败，才会返回失败的结果
    Promise.any([p1, p2, p3, ]).then(res => console.log("res", res)).catch(err => console.log("err", err, err.errors));
  </script>
</body>
</html>
