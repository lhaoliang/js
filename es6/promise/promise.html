<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Promise</title>
</head>
<body>
  <script>
    // Promise 是一个异步操作的结果容器
    // Promise 有三种状态：pending、fulfilled、rejected
    // pending 状态表示 Promise 还没有完成
    // fulfilled 状态表示 Promise 已完成，结果为成功
    // rejected 状态表示 Promise 已完成，结果为失败
    // Promise 的状态只能从 pending 变为 fulfilled 或 rejected
    // 一旦状态改变，就不能再改变
    // Promise 的状态改变时，会调用对应的回调函数
    // 可以使用 then() 方法注册成功回调函数
    // 可以使用 catch() 方法注册失败回调函数
    // 可以使用 finally() 方法注册无论状态改变都会调用的回调函数
    // 注意：finally() 方法中的回调函数，无论 Promise 状态如何，都会调用
    // 可以使用 Promise.resolve() 方法创建一个成功状态的 Promise
    // 可以使用 Promise.reject() 方法创建一个失败状态的 Promise
    // 注意：Promise.reject() 方法创建的 Promise 状态为 rejected，不能改变

    // 传入的这个函数executor，会在 Promise 创建时立即执行
    const promise = new Promise((resolve, reject) => {
      console.log(resolve);
      console.log(reject);
      resolve('成功');
      // reject('失败');
      console.log('立即执行的回调函数');
    });
    console.log(promise);
    // then() 方法注册成功回调函数
    // then 方法传入的回调函数 会在 Promise 状态改变为 fulfilled 时调用 即 resolve() 方法调用时调用
    // 注意：then() 方法可以链式调用，每个 then() 方法返回一个新的 Promise
    // .then() 方法 接受两个回调函数，一个是成功回调函数，一个是失败回调函数
    promise.then(success => console.log(success), err => console.log(err));
    // catch() 方法注册失败回调函数
    // catch 方法传入的回调函数 会在 Promise 状态改变为 rejected 时调用 即 reject() 方法调用时调用
    promise.catch(err => console.log(err));
    // finally() 方法注册无论状态改变都会调用的回调函数
    // finally 方法传入的回调函数 会在 Promise 状态改变时调用 即 resolve() 方法或 reject() 方法调用时调用
    promise.finally(res => console.log(res));
  </script>
</body>
</html>
