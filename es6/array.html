<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Array</title>
</head>

<body>
  <script>
    const arr = [1, 2, 3, 4, 5];
    console.log(arr); // [1, 2, 3, 4, 5]

    // 定义一个生成器函数，用于生成斐波那契数列
    function* fibs() {
      let a = 0;  // 第一个斐波那契数
      let b = 1;  // 第二个斐波那契数
      while (true) {  // 无限循环，可以持续生成数列
        yield a;  // 暂停并返回当前的a值
        [a, b] = [b, a + b];  // 解构赋值，更新a和b的值：a变成b，b变成a+b
      }
    }

    // 使用解构赋值从生成器中获取前6个斐波那契数
    // 每次解构会从生成器中获取下一个值
    let [first, second, third, fourth, fifth, sixth] = fibs();
    // first = 0, second = 1, third = 1, fourth = 2, fifth = 3, sixth = 5
    sixth // 5  // 第六个斐波那契数是5


    let obj = {
      name: "张三",
      age: 18,
      sex: "男",
    }
    function fun({ name, ...args }) {
      console.log(name, args);
      const { age, sex } = args;
      console.log(age, sex);
    }
    fun(obj);


    const array = [1, 2, 3];
    const name = "why";
    function fun2(x, y, z) {
      console.log(x, y, z);
    }
    // fun2.apply(null, array)
    // fun2(...array)
    // fun2(...name)
    const newArray = [...array, ...name];
    console.log(newArray); // [1, 2, 3, 'w', 'h', 'y']

    const num = 0b100; // 二进制数
    console.log(num); // 4

    const num2 = 0o10; // 八进制数
    console.log(num2); // 8
    const num3 = 0x10; // 十六进制数
    console.log(num3); // 16

    const num4 = 1000000000000n; // 大整数
    console.log(num4); // 1000000000000n
    console.log(typeof num4); // bigint

    const num5 = 1_000_000_000;
    console.log(num5); // 1000000000
    console.log(typeof num5); // number

    const str = "hello";
    const str2 = str.repeat(3)
    console.log(str, str2); // hello
  </script>

</body>

</html>
