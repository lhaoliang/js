<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>函数颗粒化 - 自定义柯里化实现</title>
</head>
<body>
  <script>
    // 函数颗粒化


    {
    // ============================================================
    // 自定义 curry 函数
    //   把一个多参数函数，转成可以逐个参数调用的"颗粒化"版本
    // ============================================================
    function curry(fn) {
      // 记录原始函数期望的参数个数
      const arity = fn.length;

      return function curried(...args) {
        //  分析：
        //   - 如果传入的参数个数 >= 原函数需要的个数，就直接执行
        //   - 如果不够，返回一个新的 curried 函数，等待后续参数
        //   - 后续参数通过 .bind() 把已收集的参数"固化"进去，
        //     这样每次调用都在前一次的基础上累积参数

        if (args.length >= arity) {
          return fn.call(this, ...args);
        }
        // 参数不够：把已收集的 args 固定，返回新函数继续等参数
        return curried.bind(this, ...args);
      };
    }

    // ============================================================
    // 示例 1：两数相加
    // ============================================================
    function add(a, b) {
      return a + b;
    }

    const curriedAdd = curry(add);

    console.log("--- 示例1：add ---");
    console.log(curriedAdd(1)(2));        // 3
    console.log(curriedAdd(5, 10));       // 15  （一次传够也行）
    const addTen = curriedAdd(10);        // 固定住第一个参数
    console.log(addTen(3));               // 13
    console.log(addTen(7));               // 17

    // ============================================================
    // 示例 2：三数相乘
    // ============================================================
    function multiply(a, b, c) {
      return a * b * c;
    }

    const curriedMultiply = curry(multiply);

    console.log("\n--- 示例2：multiply ---");
    console.log(curriedMultiply(2)(3)(4));         // 24
    console.log(curriedMultiply(2, 3)(4));         // 24
    console.log(curriedMultiply(2)(3, 4));         // 24
    console.log(curriedMultiply(2, 3, 4));         // 24

    const double = curriedMultiply(2);             // 固定第一个参数为 2
    const doubleTriple = double(3);                // 再固定第二个参数为 3
    console.log(double(5)(6));                     // 2 * 5 * 6 = 60
    console.log(doubleTriple(10));                 // 2 * 3 * 10 = 60

    // ============================================================
    // 分析总结（在控制台查看）
    // ============================================================
    console.log("\n========================================");
    console.log("【分析总结】");
    console.log("========================================");
    console.log("1. fn.length 获取函数期望的形参个数（arity）");
    console.log("2. 每调用一次 curried，累积参数");
    console.log("3. 参数够 arity 个 → 立即执行原函数");
    console.log("4. 参数不够     → 返回新函数，等剩余参数");
    console.log("5. bind(this, ...args) 把已收集的参数固化进新函数");
    console.log("6. 优势：延迟执行 + 参数复用 + 函数组合");
    }
  </script>
</body>
</html>
