<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>闭包</title>
</head>
<body>

  <script>
    // 闭包
    // 闭包是指在函数内部定义的函数，该函数可以访问函数外部的变量
    // 当一个嵌套函数被调用时，它会创建一个新的作用域，该作用域包含嵌套函数的所有变量和函数外部的所有变量
    // 闭包的作用域是函数内部的作用域，而不是函数外部的作用域
    // 闭包的作用域链是函数内部的作用域 + 函数外部的作用域 + 全局作用域
    // 当一个嵌套的内部函数引用了外部函数的变量时，内部函数就会形成一个闭包
    // function fn1() {
    //   var a = 10;
    //   var b = 20;
    //   function fn2() {
    //     console.log(a);
    //   }
    //   fn2()
    // }
    // fn1()

    /*
      常见的闭包应用场景
    */
   // 1.将函数作为另一个函数的返回值
      function fn1() {
        var a = 10;
        function fn2() {
          a++;
          console.log(a);
        }
        return fn2;
      }
      var res = fn1();
      res();
      res();

    // 2.将函数作为实参传递给另一个函数使用
    // function showDelay(msg, delay) {
    //   setTimeout(function ( ) { alert(msg);}, delay);
    // }
    // showDelay('res', 1000);

    /*
      闭包的优缺点
    */

    // 优点1: 数据私有化与封装
    function createCounter() {
      let count = 0; // 私有变量
      return {
        increment() {
          count++;
          return count;
        },
        getCount() {
          return count;
        }
      };
    }
    const counter = createCounter();
    console.log('计数器示例:', counter.increment(), counter.increment(), counter.getCount());

    // 优点2: 函数柯里化
    function multiply(x) {
      return function(y) {
        return x * y;
      };
    }
    const double = multiply(2);
    console.log('柯里化示例:', double(5)); // 输出: 10

    // 优点3: 状态保持（记忆功能）
    function memoize(fn) {
      const cache = {};
      return function(...args) {
        const key = JSON.stringify(args);
        if (cache[key]) return cache[key];
        const result = fn(...args);
        cache[key] = result;
        return result;
      };
    }
    const fibonacci = memoize(function(n) {
      return n <= 1 ? n : fibonacci(n - 1) + fibonacci(n - 2);
    });
    console.log('记忆化示例:', fibonacci(10)); // 输出: 55

    // 注意: 闭包可能导致的内存问题示例（需要谨慎使用）

  </script>
