<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>对象和函数</title>
</head>
<body>
  <script>
    let obj = {};
    console.log(obj);

    function fn() {
      console.log("hello world");
    }
    fn();

    let fun = function() {
      console.log("hello world");
    }
    fun();

    console.log(1);
    [1, 2, 3].forEach(item => {
      console.log(item);
    })
    console.log(3);

    (function (param) {  // 匿名函数  立即执行
      console.log(param);
     })("zhangsan")
  </script>
</body>
</html>
