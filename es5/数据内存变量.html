<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>数据内存变量</title>
</head>
<body>
  <script>
    /*
      数据内存变量
        什么是数据
          数据是指在计算机中存储的信息 存储在内存中的一种形式  可以是数字、字符串、布尔值等
        什么是内存
          内存是指计算机中用于存储数据的临时存储区域  可以是RAM、ROM等
        什么是变量
          变量是指在程序中用于存储数据的容器  可以是let、const等关键字定义的变量

        三者的关系
          数据存储在内存中  变量指向内存中的数据

    */

    let a = 3;
    function fn(a) {
      a = a + 1;
      console.log(a, "里面的a");
    }
    fn(a);
    console.log(a);
    let b = 4;
    let c = {};
    c = null;

  </script>
</body>
</html>
