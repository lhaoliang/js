<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>执行上下文</title>
</head>
<body>
  <script>
    // 执行上下文
    // 1. 全局执行上下文
      // 全局变量
      // 全局函数
    // 2. 函数执行上下文
    // 3. 事件执行上下文
    function fun(a, b, c, d, e, f) {
      console.log(fun.length);
      console.log(arguments[1]);
      console.log(arguments.length);
    }
    fun(1, 2,3); // window



    /*
      函数执行上下文
        1.创建ao对象
        2.将函数参数跟变量声明赋值给ao对象的属性 值为undefined
        3.实参行参相统一
        4.将函数声明赋值给ao对象的属性
    */

    function test(a, b) {
      console.log(a);  // function a() {}
      console.log(b);  // undefined
      var b = 234;
      console.log(b);  // 234
      a = 123;
      console.log(a);  // 123
      function a() {}
      var a;
      b = 234;
      var b = function() {};
      console.log(a);  // 123
      console.log(b);  // function() {}
    }
    test(1);


    /*
      全局执行上下文
        1.创建window对象
        2.将全局变量赋值给window对象的属性
        3.将全局函数赋值给window对象的属性

    */
  </script>
</body>
</html>
